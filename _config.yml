# Jekyll 配置
title: Clash免费节点获取_Clash代理节点与小火箭节点订阅教程
description: 整理Clash免费节点获取方式与Clash代理节点使用方法，包含ClashMeta配置、Clash for Android节点导入步骤及小火箭Shadowrocket节点订阅说明，覆盖节点获取、订阅更新、配置使用与常见问题处理，适合新手快速完成节点配置与日常使用。
url: https://clashmianfeijiedian.github.io
baseurl: ""

# 主题设置
theme: null
remote_theme: null

# 插件
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-paginate

# 分页设置
paginate: 10
paginate_path: "/page/:num/"

# 输出设置
markdown: kramdown
permalink: /:year/:month/:day/:title/

# 集合设置
collections:
  tutorials:
    output: true
    permalink: /tutorials/:name/

# 默认前置数据
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "Clash 资讯站"
      category: "教程"
  - scope:
      path: ""
      type: "tutorials"
    values:
      layout: "tutorial"

# SEO 设置
social:
  name: Clash 免费节点分享站
  links:
    - https://github.com/clashmianfeijiedian

# 其他设置
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - LICENSE
